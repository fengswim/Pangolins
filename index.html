<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangolins.cc - 穿山甲全球科普教育平台</title>
    <style>
        :root {
            --primary-green: #2e7d32; /* 自然綠 */
            --earth-brown: #5d4037; /* 大地棕 */
            --bg-light: #f9fbf9;
            --text-main: #333;
        }

        body {
            font-family: 'PingFang HK', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            line-height: 1.8;
        }

        /* 頂部導航 */
        nav {
            background-color: var(--primary-green);
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 主視覺區 */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background-color: #e8f5e9;
        }

        h1 { color: var(--earth-brown); margin: 0; font-size: 2.5em; }
        .subtitle { color: var(--primary-green); font-size: 1.2em; }

        /* 內容區 */
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }

        section {
            background: white;
            padding: 30px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { 
            color: var(--primary-green); 
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
        }

        h2::before { content: "🍃"; margin-right: 10px; }

        .fact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .fact-item {
            background: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95em;
        }

        /* 廣告預留位樣式 */
        .ad-placeholder {
            margin: 40px 0;
            background: #f0f0f0;
            border: 1px dashed #ccc;
            padding: 20px;
            text-align: center;
            color: #999;
