<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangolins.cc - FaiKin (辉健) 品牌实验室</title>
    <style>
        :root {
            --bg-color: #121212; /* 深矿石色背景 */
            --text-color: #e0e0e0; /* 浅灰文字 */
            --accent-color: #d4af37; /* 金属金 (辉) */
            --accent-hover: #b8962f;
            --sketch-line: #333; 
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 40px;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--text-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1em;
            color: #888;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .logo-container {
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logo 图片样式 */
        .brand-logo {
            max-width: 280px; /* 调整 Logo 大小 */
            height: auto;
            border-radius: 12px;
            /* 稍微加一点发光效果，呼应“辉” */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        main p {
            font-size: 1.2em;
            line-height: 1.8;
            color: #aaa;
            margin-bottom: 40px;
        }

        .coming-soon {
            margin-bottom: 50px;
        }

        .coming-soon-tag {
            background-color: var(--accent-color);
            color: #fff;
            padding: 8px 25px;
            border-radius: 25px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            display: inline-block;
            text-decoration: none;
        }

        .cta-section {
            margin-top: 30px;
        }

        input[type="email"] {
            background-color: transparent;
            border: 1px solid var(--sketch-line);
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 25px;
            width: 60%;
            max-width: 280px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button.subscribe {
            background-color: #222;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button.subscribe:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        footer {
            margin-top: 60px;
            font-size: 0.85em;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pangolins<span style="color:var(--accent-color)">.cc</span></h1>
            <div class="subtitle">FaiKin (辉健) 品牌实验室</div>
        </header>

        <div class="logo-container">
            <img src="logo.png" alt="FaiKin Pangolin Logo" class="brand-logo">
        </div>

        <main>
            <div class="coming-soon">
                <span class="coming-soon-tag">Coming 2026</span>
            </div>
            <p>
                穿山甲，自然的铠甲。辉健，内在的力量。<br>
                我们将坚韧与灵动结合，探索下一代运动装备。
            </p>
        </main>

        <div class="cta-section">
            <input type="email" placeholder="输入邮箱获取最新动态">
            <br>
            <button class="subscribe">通知我</button>
        </div>

        <footer>
            &copy; 2026 Pangolins.cc / FaiKin (辉健). All rights reserved.
        </footer>
    </div>
</body>
</html>
